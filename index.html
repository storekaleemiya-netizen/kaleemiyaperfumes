<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Favicons & Icons -->
    <link rel="icon" type="image/png" href="/pwa-rect-icon-192.png?v=5" />
    <link rel="shortcut icon" href="/favicon.ico?v=5" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- iOS PWA Critical Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kaleemiya" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#310101" />
    <meta name="msapplication-TileColor" content="#310101" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Safe Area for iOS (Notch / Dynamic Island support) -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>

    <title>Kaleemiya Perfumes — Premium Islamic Luxury Fragrances</title>
    <meta name="description" content="Experience the essence of purity. Kaleemiya Perfumes offers alcohol-free luxury attars, oud, and bakhoor — crafted with tradition and elegance." />

    <!-- Open Graph -->
    <meta property="og:title" content="Kaleemiya Perfumes — Premium Islamic Luxury Fragrances" />
    <meta property="og:description" content="Alcohol-free luxury attars, oud, and bakhoor crafted with tradition and elegance." />
    <meta property="og:image" content="/maroon-badge-192.png" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <script>
      // Force disable pinch-to-zoom for perfect PWA feel
      document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
